<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultra Browser</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #202124;
  color: white;
}

/* TOP BAR */
.topbar {
  display: flex;
  padding: 6px;
  gap: 6px;
  background: #2b2c2f;
}

input {
  flex: 1;
  padding: 8px;
  border-radius: 20px;
  border: none;
  outline: none;
}

button {
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  background: #3c4043;
  color: white;
  cursor: pointer;
}

/* FRAME */
iframe {
  width: 100%;
  height: calc(100vh - 50px);
  border: none;
}
</style>
</head>

<body>

<div class="topbar">
  <input id="url" placeholder="Search or enter URL">
  <button onclick="go()">Go</button>
</div>

<iframe id="frame"></iframe>

<script>
function go() {
  let input = document.getElementById("url").value.trim();
  if (!input) return;

  let url;

  // URL detection
  if (input.startsWith("http://") || input.startsWith("https://")) {
    url = input;
  } 
  else if (input.includes(".") && !input.includes(" ")) {
    url = "https://" + input;
  } 
  else {
    // ✅ WORKING search engine (does NOT get blocked)
    url = "https://html.duckduckgo.com/html/?q=" + encodeURIComponent(input);
  }

  // ✅ THIS IS THE KEY FIX (uses your proxy)
  document.getElementById("frame").src =
    "/proxy?url=" + encodeURIComponent(url);
}

// Enter key support
document.getElementById("url").addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    go();
  }
});
</script>

</body>
</html>
